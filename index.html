
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />

  <title>𝓗𝓪𝓹𝓹𝔂 𝓑𝓲𝓻𝓽𝓱𝓭𝓪𝔂 𝓣𝓻𝓲𝓷𝓱 𝓝𝓾̛̃<</title>

  <style>
    *,
    *::after,
    *::before {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    :root {
      --dark-color: #000;
    }

    body {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--dark-color);
      overflow: hidden;
      perspective: 1000px;
      padding: 50px 0px;
    }

    .night {
      position: fixed;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: 100%;
      height: 100%;
      filter: blur(0.1vmin);
      background-image:
        radial-gradient(ellipse at top, rgba(255, 80, 170, 0.16), transparent 45%),
        radial-gradient(ellipse at bottom, rgba(20, 120, 60, 0.22), transparent 55%),
        radial-gradient(circle at 50% 45%, rgba(255, 80, 170, 0.08), transparent 35%);
    }

    .happy-woman-day {
      color: white;
      font-size: 50px;
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      letter-spacing: 4px;
      z-index: 999;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.9),
        0 0 22px rgba(255, 88, 170, 0.95),
        0 0 46px rgba(255, 37, 140, 0.7);
    }

    .flowers {
      position: relative;
      width: 100vmin;
      height: 82vmin;
      transform: scale(0.9);
    }

    .flower {
      position: absolute;
      bottom: 10vmin;
      transform-origin: bottom center;
      z-index: 10;
      --fl-speed: 0.8s;
      --rot: 0deg;
      --scale: 1;
    }

    .flower--1 {
      left: 48%;
      --rot: 2deg;
      --scale: 1.05;
      animation: moving-flower-1 4s linear infinite;
      z-index: 30;
    }

    .flower--1 .flower__line {
      height: 70vmin;
      animation-delay: 0.3s;
    }

    .flower--1 .flower__line__leaf--1 {
      animation: blooming-leaf-right var(--fl-speed) 1.6s backwards;
    }

    .flower--1 .flower__line__leaf--2 {
      animation: blooming-leaf-right var(--fl-speed) 1.4s backwards;
    }

    .flower--1 .flower__line__leaf--3 {
      animation: blooming-leaf-left var(--fl-speed) 1.2s backwards;
    }

    .flower--1 .flower__line__leaf--4 {
      animation: blooming-leaf-left var(--fl-speed) 1s backwards;
    }

    .flower--1 .flower__line__leaf--5 {
      animation: blooming-leaf-right var(--fl-speed) 1.8s backwards;
    }

    .flower--1 .flower__line__leaf--6 {
      animation: blooming-leaf-left var(--fl-speed) 2s backwards;
    }

    .flower--2 {
      left: 58%;
      --rot: 20deg;
      --scale: 0.95;
      animation: moving-flower-2 4s linear infinite;
      z-index: 24;
    }

    .flower--2 .flower__line {
      height: 60vmin;
      animation-delay: 0.6s;
    }

    .flower--2 .flower__line__leaf--1 {
      animation: blooming-leaf-right var(--fl-speed) 1.9s backwards;
    }

    .flower--2 .flower__line__leaf--2 {
      animation: blooming-leaf-right var(--fl-speed) 1.7s backwards;
    }

    .flower--2 .flower__line__leaf--3 {
      animation: blooming-leaf-left var(--fl-speed) 1.5s backwards;
    }

    .flower--2 .flower__line__leaf--4 {
      animation: blooming-leaf-left var(--fl-speed) 1.3s backwards;
    }

    .flower--3 {
      left: 38%;
      --rot: -15deg;
      --scale: 0.95;
      animation: moving-flower-3 4s linear infinite;
      z-index: 24;
    }

    .flower--3 .flower__line {

    }

    .flower--3 .flower__line__leaf--1 {
      animation: blooming-leaf-right var(--fl-speed) 2.5s backwards;
    }

    .flower--3 .flower__line__leaf--2 {
      animation: blooming-leaf-right var(--fl-speed) 2.3s backwards;
    }

    .flower--3 .flower__line__leaf--3 {
      animation: blooming-leaf-left var(--fl-speed) 2.1s backwards;
    }

    .flower--3 .flower__line__leaf--4 {
      animation: blooming-leaf-left var(--fl-speed) 1.9s backwards;
    }

    .flower--4 {
      left: 27%;

      --scale: 0.78;

    .flower--5 {

    .flower--5 .flower__line {

    .flower--6 {

    .flower--6 .flower__line {

    .flower--7 {

      animation: moving-flower-2 5s linear infinite;
      z-index: 12;
    }

    .flower--7 .flower__line {
      height: 40vmin;

    }

    .flower--8 {
      left: 43%;
      bottom: 1vmin;
      --rot: -8deg;

      animation: moving-flower-1 5.2s linear infinite;
      z-index: 20;

    .flower--8 .flower__line {
      height: 44vmin;

    }

    .flower--9 {

    .flower--4 .flower__line__leaf--1,
    .flower--5 .flower__line__leaf--1,
    .flower--6 .flower__line__leaf--1,
    .flower--7 .flower__line__leaf--1,
    .flower--8 .flower__line__leaf--1,
    .flower--9 .flower__line__leaf--1 {
      animation: blooming-leaf-right var(--fl-speed) 1.6s backwards;
    }

    .flower--4 .flower__line__leaf--2,
    .flower--5 .flower__line__leaf--2,
    .flower--6 .flower__line__leaf--2,
    .flower--7 .flower__line__leaf--2,
    .flower--8 .flower__line__leaf--2,
    .flower--9 .flower__line__leaf--2 {
      animation: blooming-leaf-right var(--fl-speed) 1.4s backwards;

    .flower--7 .flower__line__leaf--3,
    .flower--8 .flower__line__leaf--3,
    .flower--9 .flower__line__leaf--3 {
      animation: blooming-leaf-left var(--fl-speed) 1.2s backwards;

    .flower--4 .flower__line__leaf--4,
    .flower--5 .flower__line__leaf--4,
    .flower--6 .flower__line__leaf--4,

    .flower--8 .flower__line__leaf--4,
    .flower--9 .flower__line__leaf--4 {
      animation: blooming-leaf-left var(--fl-speed) 1s backwards;

    .flower--4 .flower__line__leaf--5,
    .flower--5 .flower__line__leaf--5,
    .flower--6 .flower__line__leaf--5,
    .flower--7 .flower__line__leaf--5,
    .flower--8 .flower__line__leaf--5,
    .flower--9 .flower__line__leaf--5 {
      animation: blooming-leaf-right var(--fl-speed) 1.8s backwards;
    }

    .flower--4 .flower__line__leaf--6,
    .flower--5 .flower__line__leaf--6,
    .flower--6 .flower__line__leaf--6,
    .flower--7 .flower__line__leaf--6,
    .flower--8 .flower__line__leaf--6,
    .flower--9 .flower__line__leaf--6 {
      animation: blooming-leaf-left var(--fl-speed) 2s backwards;
    }

    .flower__leafs {
      position: relative;
      animation: blooming-flower 2s backwards;
      transform: scale(var(--scale));
    }

    .flower__leafs--1 {
      animation-delay: 1.1s;
    }

    .flower__leafs--2 {
      animation-delay: 1.4s;
    }

    .flower__leafs--3 {
      animation-delay: 1.7s;
    }

    .flower__leafs--4 {
      animation-delay: 1.8s;
    }

    .flower__leafs--5 {
      animation-delay: 2s;
    }

    .flower__leafs--6 {
      animation-delay: 2.2s;
    }

    .flower__leafs--7 {
      animation-delay: 2.4s;
    }

    .flower__leafs--8 {
      animation-delay: 2.6s;
    }

    .flower__leafs--9 {
      animation-delay: 2.8s;
    }

    .flower__leafs::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      transform: translate(-50%, -100%);
      width: 8vmin;
      height: 8vmin;
      background-color: #ff5bbd;
      filter: blur(10vmin);
    }

    .flower__leaf {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 8vmin;
      height: 11vmin;
      border-radius: 51% 49% 47% 53% / 44% 45% 55% 69%;
      background-color: #ffd1ec;
      background-image: linear-gradient(to top, #ff4fa3, #ffd6ef);
      transform-origin: bottom center;
      opacity: 0.92;
      box-shadow:
        inset 0 0 2vmin rgba(255, 255, 255, 0.65),
        0 0 2vmin rgba(255, 80, 170, 0.35);
    }

    .flower__leaf--1 {
      transform: translate(-10%, 1%) rotateY(40deg) rotateX(-50deg);
    }

    .flower__leaf--2 {
      transform: translate(-50%, -4%) rotateX(40deg);
    }

    .flower__leaf--3 {
      transform: translate(-90%, 0%) rotateY(45deg) rotateX(50deg);
    }

    .flower__leaf--4 {
      width: 8vmin;
      height: 8vmin;
      transform-origin: bottom left;
      border-radius: 4vmin 10vmin 4vmin 4vmin;
      transform: translate(0%, 18%) rotateX(70deg) rotate(-43deg);
      background-image: linear-gradient(to top, #e91e83, #ffd6ef);
      z-index: 1;
      opacity: 0.9;
    }

    .flower__white-circle {
      position: absolute;
      left: -3.5vmin;
      top: -3vmin;
      width: 9vmin;
      height: 4vmin;
      border-radius: 50%;
      background-color: #fff6fb;
      box-shadow:
        0 0 1.2vmin rgba(255, 180, 220, 0.8),
        inset 0 0 1vmin rgba(255, 190, 220, 0.45);
    }

    .flower__white-circle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 45%;
      transform: translate(-50%, -50%);
      width: 60%;
      height: 60%;
      border-radius: inherit;
      background-image:
        repeating-linear-gradient(300deg, rgba(120, 0, 70, 0.04) 0px, rgba(120, 0, 70, 0.04) 1px, transparent 1px, transparent 12px),
        repeating-linear-gradient(45deg, rgba(120, 0, 70, 0.04) 0px, rgba(120, 0, 70, 0.04) 1px, transparent 1px, transparent 12px),
        repeating-linear-gradient(67.5deg, rgba(120, 0, 70, 0.04) 0px, rgba(120, 0, 70, 0.04) 1px, transparent 1px, transparent 12px),
        repeating-linear-gradient(135deg, rgba(120, 0, 70, 0.04) 0px, rgba(120, 0, 70, 0.04) 1px, transparent 1px, transparent 12px),
        repeating-linear-gradient(45deg, rgba(120, 0, 70, 0.04) 0px, rgba(120, 0, 70, 0.04) 1px, transparent 1px, transparent 12px),
        repeating-linear-gradient(112.5deg, rgba(120, 0, 70, 0.04) 0px, rgba(120, 0, 70, 0.04) 1px, transparent 1px, transparent 12px),
        repeating-linear-gradient(22.5deg, rgba(120, 0, 70, 0.04) 0px, rgba(120, 0, 70, 0.04) 1px, transparent 1px, transparent 12px),
        repeating-linear-gradient(157.5deg, rgba(120, 0, 70, 0.04) 0px, rgba(120, 0, 70, 0.04) 1px, transparent 1px, transparent 12px),
        linear-gradient(90deg, #ffe96e, #ffbd00);
    }

    .flower__line {
      height: 55vmin;
      width: 1.5vmin;
      background-image:
        linear-gradient(to left, rgba(0, 0, 0, 0.25), transparent, rgba(255, 255, 255, 0.22)),
        linear-gradient(to top, transparent 10%, #0b5d35, #20b86a);
      box-shadow:
        inset 0 0 2px rgba(0, 0, 0, 0.6),
        0 0 1vmin rgba(32, 184, 106, 0.35);
      animation: grow-flower-tree 4s backwards;
    }

    .flower__line__leaf {
      --w: 7vmin;
      --h: calc(var(--w) + 2vmin);
      position: absolute;
      top: 20%;
      left: 90%;
      width: var(--w);
      height: var(--h);
      border-top-right-radius: var(--h);
      border-bottom-left-radius: var(--h);
      background-image: linear-gradient(to top, rgba(11, 93, 53, 0.5), #24c875);
      box-shadow: 0 0 1vmin rgba(36, 200, 117, 0.25);
    }

    .flower__line__leaf--1 {
      transform: rotate(70deg) rotateY(30deg);
    }

    .flower__line__leaf--2 {
      top: 45%;
      transform: rotate(70deg) rotateY(30deg);
    }

    .flower__line__leaf--3,
    .flower__line__leaf--4,
    .flower__line__leaf--6 {
      border-top-right-radius: 0;
      border-bottom-left-radius: 0;
      border-top-left-radius: var(--h);
      border-bottom-right-radius: var(--h);
      left: -460%;
      top: 12%;
      transform: rotate(-70deg) rotateY(30deg);
    }

    .flower__line__leaf--4 {
      top: 40%;
    }

    .flower__line__leaf--5 {
      top: 0;
      transform-origin: left;
      transform: rotate(70deg) rotateY(30deg) scale(0.6);
    }

    .flower__line__leaf--6 {
      top: -2%;
      left: -450%;
      transform-origin: right;
      transform: rotate(-70deg) rotateY(30deg) scale(0.6);
    }

    .flower__light {
      position: absolute;
      bottom: 0vmin;
      width: 1vmin;
      height: 1vmin;
      background-color: #ffe45c;
      border-radius: 50%;
      filter: blur(0.2vmin);
      animation: light-ans 4s linear infinite backwards;
      box-shadow:
        0 0 1vmin rgba(255, 228, 92, 0.9),
        0 0 2vmin rgba(255, 196, 40, 0.65);
    }

    .flower__light:nth-child(odd) {
      background-color: #ff6fc7;
      box-shadow:
        0 0 1vmin rgba(255, 111, 199, 0.95),
        0 0 2.2vmin rgba(255, 45, 155, 0.75);
    }

    .flower__light--1 {
      left: -2vmin;
      animation-delay: 1s;
    }

    .flower__light--2 {
      left: 3vmin;
      animation-delay: 0.5s;
    }

    .flower__light--3 {
      left: -6vmin;
      animation-delay: 0.3s;
    }

    .flower__light--4 {
      left: 6vmin;
      animation-delay: 0.9s;
    }

    .flower__light--5 {
      left: -1vmin;

    .flower__light--6 {

    }

    .flower__grass--1 {
      animation: moving-grass 2s linear infinite;
    }

    .flower__grass--2 {
      left: 2vmin;
      bottom: 10vmin;
      transform: scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg);
      opacity: 0.8;
      z-index: 0;
      animation: moving-grass--2 1.5s linear infinite;
    }

    .flower__grass--top {
      width: 7vmin;
      height: 10vmin;
      border-top-right-radius: 100%;
      border-right: var(--line-w) solid var(--c);
      transform-origin: bottom center;
      transform: rotate(-2deg);
    }

    .flower__grass--bottom {
      margin-top: -2px;
      width: var(--line-w);
      height: 25vmin;
      background-image: linear-gradient(to top, transparent, var(--c));
    }

    .flower__grass__leaf {
      --size: 10vmin;
      position: absolute;
      width: calc(var(--size) * 2.1);
      height: var(--size);
      border-top-left-radius: var(--size);
      border-top-right-radius: var(--size);

    .flower__grass__leaf--4 {

    .flower__grass__leaf--6 {

    .long-g {
      position: absolute;
      bottom: 25vmin;
      left: -42vmin;

    .long-g--1 {

    .long-g--4 {

    .long-g--5 {

      bottom: 0vmin;
      transform: scale(0.8) rotate(2deg);
    }

    .long-g--6 {

    .long-g .leaf--0 {
      left: 2vmin;
      animation: leaf-ans-1 4s linear infinite;
    }

    .long-g .leaf--1 {

      --h: 60vmin;

      transform-origin: bottom left;
      transform: rotate(-10deg) rotateY(-180deg);
      animation: leaf-ans-3 3s linear infinite;
    }

    .grow-ans {
      animation: grow-ans 2s var(--d) backwards;
    }

    .not-loaded * {
      animation-play-state: paused !important;
    }

    @keyframes growing-grass-ans--1 {
      0% {
        transform-origin: bottom left;
        transform: rotate(-20deg) scale(0);
      }
    }

    @keyframes growing-grass-ans--2 {

        transform: rotate(10deg) scale(0);
      }
    }

    @keyframes growing-grass-ans--3 {

        transform: rotate(-18deg) rotateX(-20deg) scale(0);
      }
    }

    @keyframes growing-grass-ans--4 {

        transform: rotate(2deg) scale(0);
      }
    }

    @keyframes growing-grass-ans--5 {
      0% {
        transform-origin: bottom left;
        transform: rotate(-24deg) rotateX(-20deg) scale(0);
      }
    }

    @keyframes growing-grass-ans--6 {
      0% {
        transform-origin: bottom right;
        transform: rotate(10deg) scale(0);
